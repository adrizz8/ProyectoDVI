<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="assets/sprites/player.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/game.css">
    <title>Final Faculty | The Game</title>
</head>

<body>
    <div class="page-wrapper">
        <header class="main-header">
            <h1 class="glitch-text" data-text="FINAL FACULTY">FINAL FACULTY</h1>
            <p class="subtitle">¿Estás realmente preparado para esta carrera?</p>
        </header>

        <main class="game-container">
            <!-- The game will be injected here by Phaser -->
            <div id="juego"></div>
        </main>

        <section class="game-info-container">
            <div class="controls-panel">
                <h2>Controles</h2>
                <ul class="controls-list">
                    <li><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> Movimiento</li>
                    <li><span class="key">Click Izq</span> Interactuar</li>
                    <li><span class="key">Click Der</span> Menú / Salir</li>
                </ul>
            </div>
            <div class="action-buttons">
                <a href="https://youtu.be/n8w_SLuBGzs" target="_blank" class="youtube-button">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                    Ver Trailer
                </a>
            </div>
        </section>

        <footer class="main-footer">
            <div class="footer-content">
                <p>&copy; 2026 DVI Team. Built with Phaser 3.</p>
            </div>
        </footer>
    </div>

    <!-- Preload fonts to avoid flash of unstyled text in Phaser -->
    <div style="font-family: 'Pixelify Sans'; visibility: hidden; position: absolute;">preload</div>
    <div style="font-family: 'Outfit'; visibility: hidden; position: absolute;">preload</div>
    <div style="font-family: 'VT323'; visibility: hidden; position: absolute;">preload</div>

    <script src="./src/game.js" type="module"></script>
</body>

</html>
